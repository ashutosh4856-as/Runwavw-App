<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RunWave — अग्निवीर रनिंग ट्रैकर</title>
<meta name="description" content="अग्निवीर, नेवी, आर्मी के लिए GPS रनिंग ट्रैकर">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-toggle">
  <button class="theme-btn" id="lightBtn" onclick="setTheme('light')">☀️</button>
  <button class="theme-btn" id="darkBtn" onclick="setTheme('dark')">🌙</button>
</div>

<div class="container">
  <!-- Home Panel -->
  <div id="homePanel" class="home-panel">
    <div class="greeting">
      <h2 id="greetingText">Good Morning,</h2>
      <h1 id="userName">Agniveer! 🇮🇳</h1>
    </div>

    <div class="gps-status">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsText">GPS ready — tap Start</span>
    </div>
    <div class="error-msg" id="errorMsgDiv">📍 Location permission denied. Please allow location access.</div>

    <div class="main-stats">
      <div class="main-distance">
        <span id="mainDistance">0.00</span><span> km</span>
      </div>
      <div class="label">Total Distance</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="timeValue">00:00</div>
        <div class="stat-label">Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="paceValue">--:--</div>
        <div class="stat-label">Pace</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="speedValue">0.0</div>
        <div class="stat-label">Speed (km/h)</div>
      </div>
    </div>

    <div class="calories-card">
      <div class="calories-value" id="caloriesValue">0</div>
      <div class="stat-label">Calories</div>
    </div>

    <button class="start-btn" id="startBtn">▶ START</button>
  </div>

  <!-- History Panel -->
  <div id="historyPanel" class="history-panel">
    <h3>📜 Recent Runs</h3>
    <div id="historyList"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="settings-panel">
    <h3>⚙️ Settings</h3>
    <div class="settings-item">
      <span>🌙 Dark Mode</span>
      <button class="theme-btn" onclick="toggleThemeSimple()">Toggle</button>
    </div>
    <div class="settings-item">
      <span>📍 GPS Accuracy</span>
      <span id="gpsAccuracy">—</span>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item active" data-panel="home" onclick="showPanel('home')">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-panel="history" onclick="showPanel('history')">
      <span class="nav-icon">📊</span>
      <span>History</span>
    </button>
    <button class="nav-item" data-panel="settings" onclick="showPanel('settings')">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
          </html>
