name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor & Platforms
        run: |
          npm install -g @capacitor/cli
          echo '{"name":"runwave","version":"1.0.0","private":true,"dependencies":{"@capacitor/android":"^5.0.0","@capacitor/core":"^5.0.0"}}' > package.json
          npm install
          npx cap add android

      - name: Copy Web Assets
        run: npx cap copy

      - name: Build Android App
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunWave-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
