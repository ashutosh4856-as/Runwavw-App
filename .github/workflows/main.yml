name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4 # v4 पर अपडेट किया

      - name: Setup Node.js
        uses: actions/setup-node@v4 # v4 पर अपडेट किया
        with:
          node-version: '20' # लेटेस्ट स्टेबल वर्जन

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp -r * www/ || true

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: |
          npx cap init "Runwavv App" com.runwavv.app --web-dir www
          npx cap add android

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # यहाँ v3 की जगह v4 कर दिया है
        with:
          name: Runwavv-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
