name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Prepare Web Directory
        # Capacitor को एक असली फोल्डर चाहिए होता है। 
        # हम 'www' नाम का फोल्डर बनाएंगे और सारा कोड उसमें डालेंगे।
        run: |
          mkdir -p www
          cp -r * www/ || true
          # खुद 'www' फोल्डर को 'www' के अंदर कॉपी होने से बचाने के लिए

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        # यहाँ हमने webDir को 'www' सेट किया है ताकि एरर न आए
        run: |
          npx cap init "Runwavv App" com.runwavv.app --web-dir www
          npx cap add android

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Runwavv-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
