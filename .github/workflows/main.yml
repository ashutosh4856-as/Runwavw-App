name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Web Directory
        # यहाँ हम 'dist' नाम का फोल्डर बनाकर आपकी फाइल्स उसमें डाल रहे हैं
        run: |
          mkdir -p dist
          cp -r * dist/ || true

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "runwave",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

      - name: Install dependencies
        run: npm install

      - name: Initialize Capacitor
        # यहाँ हमने web-dir को '.' से बदलकर 'dist' कर दिया है
        run: npx cap init RunWave com.runwave.tracker --web-dir=dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunWave-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
